name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Docker Hub stats
        run: |
          curl -sf https://hub.docker.com/v2/repositories/dochafizhanif/meteor-mcp/ \
            | node -e "const d=require('fs');process.stdin.on('data',c=>{const j=JSON.parse(c);d.writeFileSync('public/docker-stats.json',JSON.stringify({['dochafizhanif/meteor-mcp']:{pulls:j.pull_count,stars:j.star_count}}))})" \
            || echo '{}' > public/docker-stats.json

      - name: Fetch GitHub release data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-releases.js || echo '{}' > public/github-releases.json

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
